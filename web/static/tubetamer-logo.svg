<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 130">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#EDD472"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="goldBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8B6914"/>
      <stop offset="25%"  stop-color="#EDD472"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="75%"  stop-color="#EDD472"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="hatShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0D1828"/>
      <stop offset="32%"  stop-color="#1C3050"/>
      <stop offset="68%"  stop-color="#1C3050"/>
      <stop offset="100%" stop-color="#0D1828"/>
    </linearGradient>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────────── -->
  <rect width="500" height="130" rx="22" fill="#182442"/>

  <!-- ── ICON — all icon paths scaled 0.5× and shifted (16,16) ──────── -->
  <!-- Result: icon occupies roughly (16,16)→(116,116), centred in 130 px height -->
  <g transform="translate(16,16) scale(0.49)">

    <!-- Baton 1 shadow -->
    <line x1="26" y1="174" x2="164" y2="38"
          stroke="#08101C" stroke-width="13" stroke-linecap="round"/>
    <line x1="26" y1="174" x2="164" y2="38"
          stroke="url(#gold)" stroke-width="9" stroke-linecap="round"/>
    <line x1="26" y1="174" x2="164" y2="38"
          stroke="#F8EFA8" stroke-width="2.5" stroke-linecap="round" opacity="0.38"/>

    <!-- Baton 2 -->
    <line x1="174" y1="174" x2="36" y2="38"
          stroke="#08101C" stroke-width="13" stroke-linecap="round"/>
    <line x1="174" y1="174" x2="36" y2="38"
          stroke="url(#gold)" stroke-width="9" stroke-linecap="round"/>
    <line x1="174" y1="174" x2="36" y2="38"
          stroke="#F8EFA8" stroke-width="2.5" stroke-linecap="round" opacity="0.38"/>

    <!-- Ball ends -->
    <circle cx="164" cy="38"  r="13" fill="#08101C"/>
    <circle cx="164" cy="38"  r="11" fill="url(#gold)"/>
    <circle cx="160" cy="34"  r="4"  fill="#F8EFA8" opacity="0.48"/>
    <circle cx="36"  cy="38"  r="13" fill="#08101C"/>
    <circle cx="36"  cy="38"  r="11" fill="url(#gold)"/>
    <circle cx="32"  cy="34"  r="4"  fill="#F8EFA8" opacity="0.48"/>
    <circle cx="174" cy="174" r="13" fill="#08101C"/>
    <circle cx="174" cy="174" r="11" fill="url(#gold)"/>
    <circle cx="26"  cy="174" r="13" fill="#08101C"/>
    <circle cx="26"  cy="174" r="11" fill="url(#gold)"/>

    <!-- Hat -->
    <ellipse cx="100" cy="150" rx="66" ry="13" fill="#06101A"/>
    <ellipse cx="100" cy="152" rx="50" ry="12" fill="#D8C890" opacity="0.10"/>
    <path d="M 71,144 L 71,77 Q 72,65 100,65 Q 128,65 129,77 L 129,144 Z"
          fill="url(#hatShade)"/>
    <ellipse cx="100" cy="144" rx="66" ry="12" fill="url(#hatShade)"/>
    <ellipse cx="100" cy="65"  rx="29" ry="8"  fill="#0D1828"/>
    <rect x="71" y="126" width="58" height="18" fill="url(#goldBand)" rx="1"/>
    <line x1="84"  y1="127" x2="84"  y2="143" stroke="#6A4C0E" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="127" x2="100" y2="143" stroke="#6A4C0E" stroke-width="1" opacity="0.6"/>
    <line x1="116" y1="127" x2="116" y2="143" stroke="#6A4C0E" stroke-width="1" opacity="0.6"/>
    <line x1="88"  y1="68"  x2="86"  y2="125" stroke="#D0E8FF" stroke-width="3" opacity="0.11" stroke-linecap="round"/>
    <line x1="112" y1="68"  x2="114" y2="125" stroke="#D0E8FF" stroke-width="3" opacity="0.11" stroke-linecap="round"/>
    <ellipse cx="100" cy="144" rx="66" ry="12" fill="none" stroke="#EDE0C0" stroke-width="1.8" opacity="0.55"/>
    <path d="M 71,144 L 71,77 Q 72,65 100,65 Q 128,65 129,77 L 129,144"
          fill="none" stroke="#EDE0C0" stroke-width="1.8" opacity="0.45"/>
    <ellipse cx="100" cy="65" rx="29" ry="8" fill="none" stroke="#EDE0C0" stroke-width="1.4" opacity="0.40"/>
  </g>

  <!-- ── Divider ─────────────────────────────────────────────────────── -->
  <line x1="132" y1="20" x2="132" y2="110" stroke="#2A3D5E" stroke-width="1.5"/>

  <!-- ── Wordmark ───────────────────────────────────────────────────── -->
  <text x="152" y="66"
        font-family="Georgia,'Palatino Linotype',Palatino,serif"
        font-size="43" font-weight="700"
        fill="#EDE0C0" letter-spacing="1">TubeTamer</text>

  <!-- ── Tagline ────────────────────────────────────────────────────── -->
  <text x="155" y="91"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="13.5" font-weight="400"
        fill="#6A85A8" letter-spacing="2.2">YOUTUBE APPROVAL FOR KIDS</text>
</svg>
